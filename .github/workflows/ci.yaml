name: CI

on:
  push:
    branches-ignore:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: [self-hosted]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Send Telegram Message
        env:
          GITHUB_REF_NAME_SAFE: ${{ github.ref_name }}
          GITHUB_ACTOR_SAFE: ${{ github.actor }}
          HEAD_COMMIT_URL_SAFE: ${{ github.event.head_commit.url }}
          HEAD_COMMIT_MESSAGE_SAFE: ${{ github.event.head_commit.message }}
          HEAD_COMMIT_TIMESTAMP_SAFE: ${{ github.event.head_commit.timestamp }}
        run: |
          MSG=$(cat <<EOF
          🚀 New push to *${GITHUB_REF_NAME_SAFE}* by [${GITHUB_ACTOR_SAFE}](https://github.com/${GITHUB_ACTOR_SAFE})
          [View Commit »](${HEAD_COMMIT_URL_SAFE})
          📝 *Commit Message:* ${HEAD_COMMIT_MESSAGE_SAFE}
          📅 *Date:* ${HEAD_COMMIT_TIMESTAMP_SAFE}
          EOF
          )
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG" \
            -d parse_mode="Markdown"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Show Terraform version
        run: terraform version

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (echo 'Run `gofmt -w` on these files:' && gofmt -l . && exit 1)

      - name: Build
        run: go build ./...

      - name: Run unit tests
        run: go test ./... -count=1

      - name: Preview version bump (dry-run)
        id: tag_version
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true

      - name: Send version preview to Telegram
        if: steps.tag_version.outputs.new_tag != ''
        run: |
          MSG=$(cat <<EOF
          🧪 *Version Preview for \`${{ github.ref_name }}\`*
          🔖 *Next Tag:* \`${{ steps.tag_version.outputs.new_tag }}\`
          📦 *Release Type:* \`${{ steps.tag_version.outputs.release_type }}\`

          📝 *Changes:*
          ${{ steps.tag_version.outputs.changelog }}
          EOF
          )
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MSG" \
            -d parse_mode=Markdown
