name: Notify and CI

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]

jobs:
  notify:
    if: github.event_name == 'issues' || github.event.action == 'opened'
    runs-on: [self-hosted]
    steps:
      - name: Notify Telegram
        env:
          GITHUB_EVENT_NAME_SAFE: ${{ github.event_name }}
          ISSUE_TITLE_SAFE: ${{ github.event.issue.title }}
          ISSUE_URL_SAFE: ${{ github.event.issue.html_url }}
          PR_TITLE_SAFE: ${{ github.event.pull_request.title }}
          PR_URL_SAFE: ${{ github.event.pull_request.html_url }}
        run: |
          if [[ "${GITHUB_EVENT_NAME_SAFE}" == "issues" ]]; then
            TITLE="${ISSUE_TITLE_SAFE}"
            URL="${ISSUE_URL_SAFE}"
            MSG="🛎️ New Issue: [${TITLE}](${URL})"
          elif [[ "${GITHUB_EVENT_NAME_SAFE}" == "pull_request" ]]; then
            TITLE="${PR_TITLE_SAFE}"
            URL="${PR_URL_SAFE}"
            MSG="📦 New PR: [${TITLE}](${URL})"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG" \
            -d parse_mode="Markdown"

  pr-ci:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Run golangci-lint
        run: make lint

      - name: Run tests
        env:
          TF_ACC: "1"
          PASSBOLT_BASE_URL: ${{ vars.PASSBOLT_BASE_URL != '' && vars.PASSBOLT_BASE_URL || secrets.PASSBOLT_BASE_URL }}
          PASSBOLT_PRIVATE_KEY: ${{ secrets.PASSBOLT_PRIVATE_KEY != '' && secrets.PASSBOLT_PRIVATE_KEY || vars.PASSBOLT_PRIVATE_KEY }}
          PASSBOLT_PASSPHRASE: ${{ secrets.PASSBOLT_PASSPHRASE != '' && secrets.PASSBOLT_PASSPHRASE || vars.PASSBOLT_PASSPHRASE }}
          PASSBOLT_MANAGER_ID: ${{ vars.PASSBOLT_MANAGER_ID != '' && vars.PASSBOLT_MANAGER_ID || secrets.PASSBOLT_MANAGER_ID }}
          PASSBOLT_TEST_USER_EMAIL: ${{ vars.PASSBOLT_TEST_USER_EMAIL != '' && vars.PASSBOLT_TEST_USER_EMAIL || secrets.PASSBOLT_TEST_USER_EMAIL }}
          PASSBOLT_TEST_EMAIL_DOMAIN: ${{ vars.PASSBOLT_TEST_EMAIL_DOMAIN != '' && vars.PASSBOLT_TEST_EMAIL_DOMAIN || secrets.PASSBOLT_TEST_EMAIL_DOMAIN }}
        run: |
          go test ./... -v

  notify-success:
    if: ${{ success() && github.event_name == 'pull_request' }}
    needs: pr-ci
    runs-on: [self-hosted]
    steps:
      - name: Notify Telegram Success
        env:
          PR_TITLE_SAFE: ${{ github.event.pull_request.title }}
          PR_URL_SAFE: ${{ github.event.pull_request.html_url }}
        run: |
          TITLE="${PR_TITLE_SAFE}"
          URL="${PR_URL_SAFE}"
          MSG="✅ CI Passed for PR: [${TITLE}](${URL})"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG" \
            -d parse_mode="Markdown"
